{% extends 'core/base.html' %}
{% block title %}Delete Assessment Task{% endblock %}
{% block content %}
<section class="panel narrow">
  <h2>Delete Assessment Task</h2>
  <p>Are you sure you want to delete this task?</p>
  <p><strong>{{ object }}</strong></p>
  <form method="post">
    {% csrf_token %}
    <div class="actions">
      <button type="submit" class="btn btn-danger">Yes</button>
      <a href="{% url 'task_list' %}" class="btn btn-secondary">No</a>
    </div>
  </form>
</section>
{% endblock %}
