{% extends 'core/base.html' %}
{% block title %}Remove Learner Record{% endblock %}
{% block content %}
<section class="panel narrow">
  <h2>Remove Learner Record</h2>
  <p>Are you sure you want to remove this learner from your workspace?</p>
  <p><strong>{{ object }}</strong></p>
  <form method="post">
    {% csrf_token %}
    <div class="actions">
      <button type="submit" class="btn btn-danger">Yes</button>
      <a href="{% url 'learner_list' %}" class="btn btn-secondary">No</a>
    </div>
  </form>
</section>
{% endblock %}
